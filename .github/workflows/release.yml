name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../i18n-validate-${{ matrix.target }}.tar.gz i18n-validate
          cd ../../..

      - name: Package (windows zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../i18n-validate-${{ matrix.target }}.zip i18n-validate.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: i18n-validate-${{ matrix.target }}
          path: i18n-validate-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute SHA256 and update formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TOOL="i18n-validate"

          # Compute sha256 for each target
          SHA_MACOS_ARM64=$(sha256sum artifacts/${TOOL}-aarch64-apple-darwin/${TOOL}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_MACOS_X86=$(sha256sum artifacts/${TOOL}-x86_64-apple-darwin/${TOOL}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(sha256sum artifacts/${TOOL}-aarch64-unknown-linux-gnu/${TOOL}-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          SHA_LINUX_X86=$(sha256sum artifacts/${TOOL}-x86_64-unknown-linux-gnu/${TOOL}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)

          echo "Version: $VERSION"
          echo "macOS ARM64: $SHA_MACOS_ARM64"
          echo "macOS x86:   $SHA_MACOS_X86"
          echo "Linux ARM64: $SHA_LINUX_ARM64"
          echo "Linux x86:   $SHA_LINUX_X86"

          # Clone the homebrew-tap repo
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/i18n-agent/homebrew-tap.git" tap
          cd tap

          # Update the formula
          FORMULA="Formula/${TOOL}.rb"

          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"

          # Update sha256 values in order of appearance:
          # 1. macOS ARM64, 2. macOS x86_64, 3. Linux ARM64, 4. Linux x86_64
          python3 -c "
          import re
          with open('${FORMULA}', 'r') as f:
              content = f.read()
          sha_values = ['${SHA_MACOS_ARM64}', '${SHA_MACOS_X86}', '${SHA_LINUX_ARM64}', '${SHA_LINUX_X86}']
          idx = 0
          def replace_sha(m):
              global idx
              if idx < len(sha_values):
                  val = sha_values[idx]
                  idx += 1
                  return f'sha256 \"{val}\"'
              return m.group(0)
          content = re.sub(r'sha256 \"[a-fA-F0-9]+\"', replace_sha, content)
          with open('${FORMULA}', 'w') as f:
              f.write(content)
          "

          echo "Updated formula:"
          cat "$FORMULA"

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA"
          git commit -m "Update ${TOOL} to ${VERSION}"
          git push
